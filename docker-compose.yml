services:
  public-web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
  portal-web:
    build:
      context: .
      dockerfile: Dockerfile.portal
    ports:
      - "8081:80"
    restart: unless-stopped
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      API_PORT: 3001
      API_HOST: 0.0.0.0
      DATABASE_URL: postgresql://postgres:postgres@db:5432/webvakwerk
      PUBLIC_ORIGIN: ${PUBLIC_ORIGIN:-http://localhost:8080}
      PORTAL_ORIGIN: ${PORTAL_ORIGIN:-http://localhost:8081}
      PORTAL_COOKIE_NAME: webvakwerk_portal_session
      PORTAL_COOKIE_DOMAIN:
      PORTAL_COOKIE_SECURE: "false"
      PORTAL_SESSION_TTL_HOURS: 12
      ADMIN_EMAIL: admin@example.com
      ADMIN_NAME: Webvakwerk Admin
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH}
    volumes:
      - ticket_uploads:/app/storage/ticket-attachments
    depends_on:
      - db
    restart: unless-stopped
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: webvakwerk
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
  proxy:
    image: nginx:1.27-alpine
    depends_on:
      - public-web
      - portal-web
      - api
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/proxy.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  postgres_data:
  ticket_uploads:
