services:
  public-web:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PORT: 8080
      PEPPERMINT_BASE_URL: ${PEPPERMINT_BASE_URL}
      PEPPERMINT_EMAIL: ${PEPPERMINT_EMAIL}
      PEPPERMINT_PASSWORD: ${PEPPERMINT_PASSWORD}
    ports:
      - "8080:8080"
    restart: unless-stopped
