name: Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy (branch, tag, or commit SHA)
        required: false
        default: main
        type: string

concurrency:
  group: deploy-webvakwerk
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on:
      - self-hosted
    timeout-minutes: 30

    steps:
      - name: Check out requested ref
        if: github.event_name == 'workflow_dispatch' && inputs.ref != ''
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 1

      - name: Check out triggering commit
        if: github.event_name != 'workflow_dispatch' || inputs.ref == ''
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Verify Docker tooling
        run: |
          docker --version
          docker compose version

      - name: Deploy stack
        run: docker compose up -d --build --remove-orphans

      - name: Show service status
        if: always()
        run: docker compose ps

      - name: Show recent logs on failure
        if: failure()
        run: docker compose logs --tail=200
